version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartshape-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartshape-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: smartshape-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  backend_uploads:
