# This box has ~8 GB RAM; an 8 GB heap OOM-crashes the Gradle daemon.
# Keep the JVM + Kotlin daemon modest and disable parallel/worker fan-out.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m
kotlin.daemon.jvmargs=-Xmx1024m
org.gradle.workers.max=2
org.gradle.parallel=false
org.gradle.daemon=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Disable Kotlin incremental compilation: avoids a Windows file-lock error
# ("Could not close incremental caches") seen on first builds under a path
# containing spaces.
kotlin.incremental=false
