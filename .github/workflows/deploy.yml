name: Deploy (handled on the VPS)

# IMPORTANT: GitHub-hosted runners CANNOT deploy this project over SSH.
# Hostinger drops inbound SSH from GitHub's runner IP ranges upstream — confirmed
# 2026-06-06: connection attempts never reach the VPS sshd (i/o timeout, no auth-log
# entries), while the owner's IP connects fine. No secret/host change can fix that.
#
# Deploys are handled ON the VPS by a systemd timer (ss-autodeploy.timer) that polls
# origin/main every ~2 minutes and rebuilds backend + frontend when main changes
# (script: /usr/local/bin/ss-autodeploy.sh, log: /var/log/ss-autodeploy.log).
#
# So: just push to main — it goes live automatically ~1-2 min later.
# Manual deploy if ever needed: deploy-live.bat (local), or `bash deploy.sh` on the VPS.
#
# This workflow no longer attempts SSH (it would always time out). It only prints a
# reminder when triggered manually, so pushes no longer show a red failing check.

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: How deploys work
        run: |
          echo "Deploys are automatic on the VPS via ss-autodeploy.timer (~2 min after push to main)."
          echo "Watch:   ssh root@srv1667373.hstgr.cloud 'tail -f /var/log/ss-autodeploy.log'"
          echo "Manual:  run deploy-live.bat, or on the VPS: bash deploy.sh"
