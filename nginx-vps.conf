# SmartShape Pro — Nginx config for Hostinger VPS
# Supports two modes:
#   MODE A (IP-only, internal):  access via http://YOUR_VPS_IP  (no domain needed)
#   MODE B (domain + SSL):       access via https://yourdomain.com
#
# WHICH TO USE:
#   Internal team only → use MODE A (simpler, no SSL hassle)
#   Want a proper URL  → use MODE B after pointing domain to VPS IP
#
# INSTALL:
#   sudo cp nginx-vps.conf /etc/nginx/sites-available/smartshape
#   sudo ln -sf /etc/nginx/sites-available/smartshape /etc/nginx/sites-enabled/smartshape
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ─── MODE A: IP-only (no domain, no SSL) ─────────────────────────────────────
# Comment this block out if you switch to MODE B
server {
    listen 80;
    server_name _;          # accepts any IP or hostname

    client_max_body_size 20M;

    # Backend API & WebSocket
    location /api/ {
        proxy_pass         http://localhost:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass          http://localhost:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    # Frontend (React build served by Docker nginx container on :3000)
    location / {
        proxy_pass         http://localhost:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}

# ─── MODE B: Domain + SSL (uncomment when you have a domain) ──────────────────
# Prerequisites:
#   1. Point yourdomain.com A-record to your VPS IP in DNS
#   2. Wait for DNS propagation (5–30 min)
#   3. Run: sudo certbot --nginx -d yourdomain.com -m info@smartshape.in --agree-tos
