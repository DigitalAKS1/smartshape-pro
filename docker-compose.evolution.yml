version: '3.8'

# ────────────────────────────────────────────────────────────────────
# SmartShape — Evolution API WhatsApp Stack (with built-in Tor proxy)
#
# Usage:
#   1. Copy .env.evolution.example → .env.evolution and fill in values
#   2. docker compose -f docker-compose.evolution.yml up -d --build
#   3. Open SmartShape → Marketing → WhatsApp Setup → Connect → scan QR
#
# Tor routes Baileys through a non-datacenter IP so WhatsApp accepts it.
# No SSH proxy scripts needed — Tor runs as a container in this stack.
#
# To use a paid residential proxy instead (Settings → WhatsApp tab):
#   Simply configure it in the app — it overrides the Tor routing.
# ────────────────────────────────────────────────────────────────────

services:

  # ── Tor SOCKS5 proxy ───────────────────────────────────────────────
  tor:
    build:
      context: .
      dockerfile: Dockerfile.tor
    container_name: smartshape_tor
    restart: unless-stopped
    networks:
      - smartshape_net

  # ── Transparent proxy sidecar ─────────────────────────────────────
  # Shares Evolution API's network namespace. Sets iptables OUTPUT
  # rules so all Evolution TCP goes through redsocks → Tor.
  tor-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.redsocks
    container_name: smartshape_tor_sidecar
    network_mode: "service:evolution-api"   # shares Evolution's netns
    cap_add:
      - NET_ADMIN
    environment:
      TOR_HOST: tor
      TOR_PORT: "9050"
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT: ${PROXY_PORT:-10001}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASS: ${PROXY_PASS:-}
    depends_on:
      evolution-api:
        condition: service_started
      tor:
        condition: service_healthy
    restart: unless-stopped

  # ── Evolution API ─────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: smartshape_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.evolution
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartshape_redis_wa
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartshape_postgres_wa
    restart: unless-stopped
    env_file:
      - .env.evolution
    environment:
      POSTGRES_DB:       evolution
      POSTGRES_USER:     evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
  evolution_store:
  redis_data:
  postgres_data:

networks:
  smartshape_net:
    name: smartshape_net
    driver: bridge
