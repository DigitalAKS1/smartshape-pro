version: '3.8'

# ────────────────────────────────────────────────────────────────────
# SmartShape — Evolution API WhatsApp Stack (with built-in Tor proxy)
#
# Usage:
#   1. Copy .env.evolution.example → .env.evolution and fill in values
#   2. docker compose -f docker-compose.evolution.yml up -d --build
#   3. Open SmartShape → Marketing → WhatsApp Setup → Connect → scan QR
#
# Tor routes Baileys through a non-datacenter IP so WhatsApp accepts it.
# No SSH proxy scripts needed — Tor runs as a container in this stack.
#
# To use a paid residential proxy instead (Settings → WhatsApp tab):
#   Simply configure it in the app — it overrides the Tor routing.
# ────────────────────────────────────────────────────────────────────

services:

  # ── Cloudflare WARP proxy (free, bypasses WhatsApp VPS block) ──────
  # Uses Cloudflare's legitimate network IPs — not blocked by WhatsApp.
  # Falls back to residential proxy if PROXY_HOST is set in .env.evolution.
  warp:
    image: caomingjun/warp
    container_name: smartshape_warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD", "curl", "-sx", "socks5h://127.0.0.1:1080", "https://ifconfig.io"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Transparent proxy sidecar ─────────────────────────────────────
  # Shares Evolution API's network namespace. Sets iptables OUTPUT
  # rules so all Evolution TCP goes through redsocks → WARP / residential proxy.
  tor-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.redsocks
    container_name: smartshape_tor_sidecar
    network_mode: "service:evolution-api"
    cap_add:
      - NET_ADMIN
    environment:
      # Residential proxy credentials (from .env.evolution) — if set, used instead of WARP
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT: ${PROXY_PORT:-10001}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASS: ${PROXY_PASS:-}
      # WARP fallback (used when PROXY_HOST is empty)
      TOR_HOST: warp
      TOR_PORT: "1080"
    depends_on:
      evolution-api:
        condition: service_started
      warp:
        condition: service_healthy
    restart: unless-stopped

  # ── Evolution API ─────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: smartshape_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.evolution
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartshape_redis_wa
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartshape_postgres_wa
    restart: unless-stopped
    env_file:
      - .env.evolution
    environment:
      POSTGRES_DB:       evolution
      POSTGRES_USER:     evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartshape_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
  evolution_store:
  redis_data:
  postgres_data:

networks:
  smartshape_net:
    name: smartshape_net
    driver: bridge
