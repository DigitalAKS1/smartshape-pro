<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — SmartShape Pro</title>
<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#1a1a2e; color:#eaeaea; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
  h1 { color:#e94560; font-size:24px; margin:0 0 8px; }
  p { color:#aaa; font-size:14px; max-width:340px; }
  .icon { width:72px; height:72px; border-radius:50%; background:rgba(233,69,96,0.15); display:flex; align-items:center; justify-content:center; margin-bottom:20px; font-size:28px; }
  button { margin-top:24px; padding:12px 24px; border:none; border-radius:999px; background:#e94560; color:white; font-weight:600; cursor:pointer; font-size:14px; }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>SmartShape Pro needs a connection to load this page. Any actions you take in the app will sync once you're back online.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
